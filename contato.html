<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noir Cuisine - Contato</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
        <div class="container">

            <!-- LOGO NO LUGAR DO NOME DA EMPRESA -->
            <a class="navbar-brand" href="index.html">
                <img src="noircuisine_logo.png" alt="Logo Noir Cuisine" class="logo-navbar">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container pagina-interna">

        <section class="text-center mb-5">
            <h1 class="titulo">Entre em Contato</h1>
            <p class="lead">
                Preencha o formulário abaixo para falar com o Noir Cuisine.
            </p>
        </section>

        <!-- Formulário centralizado e responsivo -->
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <form class="formulario p-4 rounded shadow">

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                    </div>

                    <div class="mb-3">
                        <label for="assunto" class="form-label">Assunto</label>
                        <select class="form-select" id="assunto" required>
                            <option value="">Selecione uma opção</option>
                            <option value="reserva">Reserva de mesa</option>
                            <option value="evento">Evento privado</option>
                            <option value="duvida">Dúvida</option>
                            <option value="outro">Outro assunto</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="mensagem" class="form-label">Mensagem</label>
                        <textarea class="form-control" id="mensagem" rows="5" placeholder="Digite sua mensagem"
                            required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Enviar</button>
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                    </div>

                </form>

            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Noir Cuisine</p>
            <p class="mb-0">Contato: contato@noircuisine.com | Instagram: @noircuisine</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
